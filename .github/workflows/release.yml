# Builds downloadable macOS (universal: Intel + Apple Silicon) and Windows
# packages, and — only when you deliberately opt in — publishes them to
# itch.io. This is the Windows build path: a native Windows runner does the
# compile, so no local cross-compilation (impossible with a Homebrew Rust
# toolchain) and no second machine are needed.
#
# HOW TO USE
#   * Every push to `main` and every run you trigger by hand (Actions tab →
#     "Build & Release" → "Run workflow") builds both platforms and attaches
#     the zips to the run as downloadable artifacts. Nothing is published.
#   * To publish to itch.io, do BOTH of these once:
#       1. Add a repository secret BUTLER_API_KEY (Settings → Secrets and
#          variables → Actions). Get the key from `butler login` locally, or
#          from https://itch.io/user/settings/api-keys.
#       2. Set ITCH_TARGET below to "<your-itch-username>/<your-game-slug>".
#     Then push a version tag (e.g. `git tag v0.1.0 && git push origin
#     v0.1.0`). The publish job runs ONLY on `v*` tags AND only when the
#     secret exists, so it can never publish by accident.

name: Build & Release

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    tags: ['v*']

env:
  # Set to "<username>/<game-slug>" to enable itch.io publishing on tags.
  ITCH_TARGET: ""

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS builds both arches so `lipo` can fuse a universal binary;
          # Windows uses the runner's default MSVC target.
          targets: ${{ matrix.platform == 'macos' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: cargo build --release

      - name: Build (macOS universal)
        if: matrix.platform == 'macos'
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p target/release
          lipo -create -output target/release/metalworld \
            target/x86_64-apple-darwin/release/metalworld \
            target/aarch64-apple-darwin/release/metalworld
          strip target/release/metalworld

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/metalworld
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp target/release/metalworld.exe dist/metalworld/
          else
            cp target/release/metalworld dist/metalworld/
          fi
          # Assets MUST sit next to the executable: run standalone (not via
          # cargo), Bevy resolves `assets/` relative to the binary.
          cp -R assets dist/metalworld/
          find dist -name '.DS_Store' -delete

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: metalworld-${{ matrix.platform }}
          path: dist/metalworld

  publish:
    # Publishes to itch.io ONLY on a version tag AND only if BUTLER_API_KEY
    # is set. Adding this workflow alone never publishes anything.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish to itch.io via butler
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          if [ -z "$BUTLER_API_KEY" ] || [ -z "$ITCH_TARGET" ]; then
            echo "BUTLER_API_KEY secret or ITCH_TARGET not set — skipping itch.io upload."
            exit 0
          fi
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          VERSION="${GITHUB_REF_NAME#v}"
          ./butler push artifacts/metalworld-macos   "$ITCH_TARGET:mac"     --userversion "$VERSION"
          ./butler push artifacts/metalworld-windows "$ITCH_TARGET:windows" --userversion "$VERSION"
